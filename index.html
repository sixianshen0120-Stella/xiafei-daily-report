* { box-sizing: border-box; margin: 0; padding: 0; }

body {

.container { max-width: 1100px; margin: 0 auto; }

.card {

  padding: 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);

.card-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: #1e3a5f;
}

.card-title .icon { font-size: 20px; }

  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 14px;
  font-family: inherit;
}

.date-info {
  display: flex;
  gap: 20px;
  margin-left: auto;

  color: var(--text-secondary);
}

.date-info span { white-space: nowrap; }

  font-weight: 700;
  color: #374151;
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 2px solid #e5e7eb;
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.form-group label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.form-group input {
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 14px;
  font-family: inherit;
  transition: border-color 0.2s;

}

.form-group input:focus {

  border-color: var(--accent);

}

.form-group input.data-input {

  border-color: #a7f3d0;
}

.form-group input.manual-input {
  background: #fffbeb;
  border-color: #fcd34d;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;

.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }

.btn-secondary { background: #e5e7eb; color: #374151; }
.btn-secondary:hover { background: #d1d5db; }

.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #047857; }

.btn-outline {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);

.btn-outline:hover { background: #f9fafb; }

.btn-sm { padding: 6px 12px; font-size: 12px; }

.btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }

.output-table {

  font-size: 13px;

.output-table th, .output-table td {

.output-table thead th {

.toast {

.tabs {

.tab {

.upload-row {

.upload-zone {

.ocr-status {

@media (max-width: 768px) {

  .date-row { flex-direction: column; align-items: flex-start; }
  .date-info { margin-left: 0; }
}

@media (max-width: 480px) {
  .form-grid { grid-template-columns: 1fr; }
}
</style>

function updateDateInfo() {
  const dateVal = document.getElementById('reportDate').value;
  if (!dateVal) return;
  const d = new Date(dateVal + 'T00:00:00');
  const dayOfMonth = d.getDate();
  const startOfYear = new Date(d.getFullYear(), 0, 0);
  const dayOfYear = Math.floor((d - startOfYear) / 86400000);
  const timeProgress = (dayOfMonth / 31 * 100).toFixed(1);

  document.getElementById('dayOfMonth').textContent = dayOfMonth;
  document.getElementById('dayOfYear').textContent = dayOfYear;
  document.getElementById('timeProgress').textContent = timeProgress + '%';

  window._dayOfMonth = dayOfMonth;
  window._dayOfYear = dayOfYear;
  window._timeProgress = timeProgress;

  updateOutput();
}

function getAllInputData() {
  const data = {};

  function readFields(fields) {
    const result = {};
    fields.forEach(f => {
      const el = document.getElementById('inp_' + f.key);
      result[f.key] = el ? (parseFloat(el.value) || 0) : (f.default || 0);
    });
    return result;
  }

  data.thisYear = readFields(FIELDS_THIS_YEAR);
  data.lastYear = readFields(FIELDS_LAST_YEAR);
  data.manual = readFields(FIELDS_MANUAL);
  data.fixed = readFields(FIELDS_FIXED);
  data.date = document.getElementById('reportDate').value;

  return data;
}

// ==================== 璁＄畻寮曟搸 ====================

function calculate(data) {
  const d = data.thisYear;
  const ly = data.lastYear;
  const m = data.manual;
  const f = data.fixed;

  const dayOfMonth = window._dayOfMonth || new Date().getDate();
  const dayOfYear = window._dayOfYear || 180;

  const timeProgress = (dayOfMonth / 31 * 100);

  // 鏀跺叆鎸囨爣
  const monthBudgetConfirmed = f.budgetMonthConfirmed || 194;
  const monthBudgetAccrual = f.budgetMonthAccrual || 194;
  const yearBudgetConfirmed = f.budgetYearConfirmed || 2250.9;
  const yearBudgetAccrual = f.budgetYearAccrual || 2250.9;

  const monthlyTargetConfirmed = monthBudgetConfirmed / 31 * dayOfMonth;
  const yearlyTargetConfirmed = yearBudgetConfirmed / 365 * dayOfYear;
  const monthlyTargetAccrual = monthBudgetAccrual / 31 * dayOfMonth;
  const yearlyTargetAccrual = yearBudgetAccrual / 365 * dayOfYear;

  const confirmedMonthRate = monthlyTargetConfirmed > 0 ? (d.monthRevenueConfirmed / monthlyTargetConfirmed * 100) : 0;
  const confirmedYearRate = yearlyTargetConfirmed > 0 ? (d.yearRevenueConfirmed / yearlyTargetConfirmed * 100) : 0;
  const accrualMonthRate = monthlyTargetAccrual > 0 ? (d.monthRevenueAccrual / monthlyTargetAccrual * 100) : 0;
  const accrualYearRate = yearlyTargetAccrual > 0 ? (d.yearRevenueAccrual / yearlyTargetAccrual * 100) : 0;

  // 鏀跺叆鍚屽簵鍚屾瘮 = 浠婂勾骞寸疮纭敹 / 25骞村悓鏈熷勾绱‘鏀?- 1
  const yoyRevenue = ly.lyYearRevenueConfirmed > 0 ? ((d.yearRevenueConfirmed / ly.lyYearRevenueConfirmed - 1) * 100) : 0;

  // 缁忚惀鎸囨爣
  const dailyNewSignDay = Math.max(0, (d.dailyNewSignDay || 0) - (m.renewDay || 0));
  const dailyNewSignLong = Math.max(0, (d.dailyNewSignLong || 0) - (m.renewLong || 0));

  const dailyOccRateDay = (d.dailyOccRateDay || 0) + 0.1;
  const dailyOccRateLong = (d.dailyOccRateLong || 0) + 0.1;
  const totalDailyOccRate = Math.round((dailyOccRateDay + dailyOccRateLong) * 10) / 10;

  const monthOccRateDay = d.monthOccRateDay || 0;
  const monthOccRateLong = d.monthOccRateLong || 0;
  const totalMonthOccRate = monthOccRateDay + monthOccRateLong;

  // 鍚屾湡瀵规瘮鍧囦环 = 鏃ョ鏈堢疮绛剧害鍧囦环 / 25骞村悓鏈熸棩绉熸湀绱绾﹀潎浠?- 1
  const priceYoY = ly.lyMonthAvgPriceDay > 0 ? ((d.monthAvgPriceDay / ly.lyMonthAvgPriceDay - 1) * 100) : 0;

  // 閫€鎴挎枃妗?  const checkoutDay = m.checkoutDay || 0;
  const checkoutLong = m.checkoutLong || 0;
  let checkoutText = '';
  if (checkoutDay === 0 && checkoutLong === 0) {
    checkoutText = '鏃犻€€';
  } else {
    const parts = [];
    if (checkoutDay > 0) parts.push(`鏃ョ閫€${checkoutDay}闂碻);
    if (checkoutLong > 0) parts.push(`闀跨閫€${checkoutLong}闂碻);
    checkoutText = parts.join('锛?);
  }

  return {
    monthBudgetConfirmed,
    monthBudgetAccrual,
    yearBudgetConfirmed,
    yearBudgetAccrual,
    monthRevenueConfirmed: d.monthRevenueConfirmed,
    monthRevenueAccrual: d.monthRevenueAccrual,
    yearRevenueConfirmed: d.yearRevenueConfirmed,
    yearRevenueAccrual: d.yearRevenueAccrual,
    confirmedMonthRate: confirmedMonthRate.toFixed(1),
    confirmedYearRate: confirmedYearRate.toFixed(1),
    accrualMonthRate: accrualMonthRate.toFixed(1),
    accrualYearRate: accrualYearRate.toFixed(1),
    lyMonthRevenueConfirmed: ly.lyMonthRevenueConfirmed,
    yoyRevenue: yoyRevenue.toFixed(1),
    timeProgress: timeProgress.toFixed(1),

    dailyNewSignDay,
    dailyNewSignLong,
    renewDay: m.renewDay || 0,
    renewLong: m.renewLong || 0,
    dailyInRentDay: d.dailyInRentDay || 0,
    dailyInRentLong: d.dailyInRentLong || 0,
    totalRooms: f.totalRooms || 239,
    dailyOccRateDay: dailyOccRateDay.toFixed(1),
    dailyOccRateLong: dailyOccRateLong.toFixed(1),
    totalDailyOccRate: totalDailyOccRate.toFixed(1),
    monthOccRateDay: monthOccRateDay.toFixed(1),
    monthOccRateLong: monthOccRateLong.toFixed(1),
    totalMonthOccRate: totalMonthOccRate.toFixed(1),
    dailyNewAvgPriceDay: d.dailyNewAvgPriceDay || 0,
    monthAvgPriceDay: d.monthAvgPriceDay || 0,
    monthAvgPriceLong: d.monthAvgPriceLong || 0,
    lyMonthAvgPriceDay: ly.lyMonthAvgPriceDay || 0,
    priceYoY: priceYoY.toFixed(0),

    targetOccRateDay: f.targetOccRateDay || 42,
    targetOccRateLong: f.targetOccRateLong || 42,
    longTargetNew: m.longTargetNew || 0,
    longTargetRooms: m.longTargetRooms || 0,
    npiEstimate: m.npiEstimate || 416,
    checkoutText,
    date: data.date,
  };
}

  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

  if (name === 'table') {
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('tabTable').classList.add('active');
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('tabReport').classList.add('active');
  }
}

// ==================== 鎴浘涓婁紶 & OCR ====================

function setupDragDrop(zoneId, fileInputId, handler) {
  const zone = document.getElementById(zoneId);
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) {
      const dt = new DataTransfer();
      dt.items.add(file);
      document.getElementById(fileInputId).files = dt.files;
      handler();
    }
  });
}

function handleThisYearUpload() {
  const file = document.getElementById('fileThisYear').files[0];
  if (!file) return;
  showPreview('previewThisYear', file);
  document.getElementById('uploadThisYear').classList.add('has-image');
  runOCR(file, 'thisYear', 'ocrStatusThisYear');
}

function handleLastYearUpload() {
  const file = document.getElementById('fileLastYear').files[0];

function showPreview(imgId, file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById(imgId);
    img.src = e.target.result;
    img.style.display = '';
  };
  reader.readAsDataURL(file);
}

async function runOCR(file, type, statusId) {
  const statusEl = document.getElementById(statusId);
  statusEl.textContent = '鍔犺浇 OCR 寮曟搸...';
  statusEl.className = 'ocr-status loading';

  try {
    // Convert File to data URL (base64) - Tesseract v5 needs a URL or base64, not a File object
    const dataUrl = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    const worker = await Tesseract.createWorker('chi_sim', 1, {
      logger: m => {
        if (m.status === 'recognizing text') {
          const pct = Math.round(m.progress * 100);
          statusEl.textContent = `璇嗗埆涓?.. ${pct}%`;
        } else if (m.status && m.status.includes('loading')) {
          statusEl.textContent = `鍔犺浇涓?.. ${m.status}`;
        }
      }
    });
    const { data: { text } } = await worker.recognize(dataUrl);
    await worker.terminate();

    console.log('OCR raw text (' + type + '):', text);

    statusEl.textContent = '璇嗗埆瀹屾垚 鉁?;
    statusEl.className = 'ocr-status done';

    const parsed = parseOCRText(text, type);
    fillFormFromOCR(parsed, type);

  } catch (err) {
    console.error('OCR error:', err);
    statusEl.textContent = '璇嗗埆澶辫触锛岃鎵嬪姩濉叆';
    statusEl.className = 'ocr-status error';
  }
}

function parseOCRText(text, type) {
  // Strategy: remove ALL spaces from the text first, since OCR adds spaces between every character.
  // "鏈?绱?鏀?鍏?( 纭?鏀?)" 鈫?"鏈堢疮鏀跺叆(纭敹)" 鈥?then exact matching works.
  const noSpace = text.replace(/\s+/g, '');

  const result = {};

  // Helper: find first number after a keyword in no-space text
  const findNum = (keyword, skipNums = 0) => {
    const idx = noSpace.indexOf(keyword);
    if (idx < 0) return null;
    // Look at up to 100 chars after the keyword
    const snippet = noSpace.substring(idx + keyword.length, idx + keyword.length + 100);
    // Match numbers: handle both "1,035.6" (normal) and "1.035.6" (OCR error with dots)
    // Also match "143.4" and "20.8%" and "0"
    const regex = /([\d,.]+)/g;
    const matches = [];
    let m;
    while ((m = regex.exec(snippet)) !== null) {
      const raw = m[1];
      // Try to parse: replace commas, handle double-dot OCR errors like "1.035.6"
      let cleaned = raw.replace(/,/g, '');
      // If there are multiple dots (OCR artifact), keep only the last one as decimal
      const dots = cleaned.match(/\./g);
      if (dots && dots.length > 1) {
        // "1.035.6" 鈫?remove all dots except the last one 鈫?"1035.6"
        const lastDot = cleaned.lastIndexOf('.');
        cleaned = cleaned.substring(0, lastDot).replace(/\./g, '') + cleaned.substring(lastDot);
      }
      const n = parseFloat(cleaned);
      if (!isNaN(n)) matches.push(n);
    }
    return skipNums < matches.length ? matches[skipNums] : (matches.length > 0 ? matches[0] : null);
  };

  // Helper: find all numbers after a keyword
  const findAllNums = (keyword, maxNums = 10) => {
    const idx = noSpace.indexOf(keyword);
    if (idx < 0) return [];
    const snippet = noSpace.substring(idx + keyword.length, idx + keyword.length + 150);
    const regex = /([\d,.]+)/g;
    const nums = [];
    let m;
    while ((m = regex.exec(snippet)) !== null && nums.length < maxNums) {
      const raw = m[1];
      let cleaned = raw.replace(/,/g, '');
      const dots = cleaned.match(/\./g);
      if (dots && dots.length > 1) {
        const lastDot = cleaned.lastIndexOf('.');
        cleaned = cleaned.substring(0, lastDot).replace(/\./g, '') + cleaned.substring(lastDot);
      }
      const n = parseFloat(cleaned);
      if (!isNaN(n)) nums.push(n);
    }
    return nums;
  };

  // Helper: find Nth occurrence of a keyword and get numbers after it
  const findNumNth = (keyword, n, skipNums = 0) => {
    let idx = -1;
    for (let i = 0; i < n; i++) {
      idx = noSpace.indexOf(keyword, idx + 1);
      if (idx < 0) return null;
    }
    const snippet = noSpace.substring(idx + keyword.length, idx + keyword.length + 100);
    const regex = /([\d,.]+)/g;
    const matches = [];
    let m;
    while ((m = regex.exec(snippet)) !== null) {
      const raw = m[1];
      let cleaned = raw.replace(/,/g, '');
      const dots = cleaned.match(/\./g);
      if (dots && dots.length > 1) {
        const lastDot = cleaned.lastIndexOf('.');
        cleaned = cleaned.substring(0, lastDot).replace(/\./g, '') + cleaned.substring(lastDot);
      }
      const n = parseFloat(cleaned);
      if (!isNaN(n)) matches.push(n);
    }
    return skipNums < matches.length ? matches[skipNums] : (matches.length > 0 ? matches[0] : null);
  };

  if (type === 'thisYear') {
    // Revenue section
    // "鏈堢疮鏀跺叆(纭敹)" 鈫?first number is 鏈堢疮纭敹
    result.monthRevenueConfirmed = findNum('鏈堢疮鏀跺叆(纭敹)');
    // "宸插彂鐢? 1st occurrence 鈫?鏈堢疮鏉冭矗
    result.monthRevenueAccrual = findNumNth('宸插彂鐢?, 1);
    // "骞寸疮鏀跺叆(纭敹)" 鈫?first number
    result.yearRevenueConfirmed = findNum('骞寸疮鏀跺叆(纭敹)');
    // "宸插彂鐢? 2nd occurrence 鈫?骞寸疮鏉冭矗
    result.yearRevenueAccrual = findNumNth('宸插彂鐢?, 2);

    // Indicator table rows
    // "褰撴棩鏂扮(闂?" 鈫?鏃ョ, 闀跨 (first 2 numbers)
    const newSign = findAllNums('褰撴棩鏂扮(闂?');
    if (newSign.length >= 2) {
      result.dailyNewSignDay = newSign[0];
      result.dailyNewSignLong = newSign[1];
    }

    // "褰撴棩鍦ㄧ(闂?" 鈫?鏃ョ, 闀跨
    const inRent = findAllNums('褰撴棩鍦ㄧ(闂?');
    if (inRent.length >= 2) {
      result.dailyInRentDay = inRent[0];
      result.dailyInRentLong = inRent[1];
    }

    // "褰撴棩闂村鍑虹鐜? 鈫?鏃ョ, 闀跨
    const dailyOcc = findAllNums('褰撴棩闂村鍑虹鐜?);
    if (dailyOcc.length >= 2) {
      result.dailyOccRateDay = dailyOcc[0];
      result.dailyOccRateLong = dailyOcc[1];
    }

    // "鏈堢疮闂村鍑虹鐜? 鈫?鏃ョ, 闀跨
    const monthOcc = findAllNums('鏈堢疮闂村鍑虹鐜?);
    if (monthOcc.length >= 2) {
      result.monthOccRateDay = monthOcc[0];
      result.monthOccRateLong = monthOcc[1];
    }

    // "褰撴棩鏂扮鍧囦环" 鈫?鏃ョ (first number)
    result.dailyNewAvgPriceDay = findNum('褰撴棩鏂扮鍧囦环');

    // "鏈堢疮绛剧害鍧囦环" 鈫?鏃ョ, 闀跨
    const monthPrice = findAllNums('鏈堢疮绛剧害鍧囦环');
    if (monthPrice.length >= 2) {
      result.monthAvgPriceDay = monthPrice[0];
      result.monthAvgPriceLong = monthPrice[1];
    }

  } else {
    // Last year (25骞村悓鏈? 鈥?note: OCR may misread "绱? as "杞?, "绛? as "鏍囩"
    // Try multiple keyword variations
    result.lyMonthRevenueConfirmed = findNum('鏈堢疮鏀跺叆(纭敹)') || findNum('鏈堣僵鏀跺叆(纭敹)');
    result.lyYearRevenueConfirmed = findNum('骞寸疮鏀跺叆(纭敹)') || findNum('骞磋僵鏀跺叆(纭敹)');

    // 鏈堢疮绛剧害鍧囦环 鈫?try variations
    let monthPrice = findAllNums('鏈堢疮绛剧害鍧囦环');
    if (monthPrice.length === 0) monthPrice = findAllNums('鏈堟爣绛剧害鍧囦环');
    if (monthPrice.length >= 1) result.lyMonthAvgPriceDay = monthPrice[0];
  }

  console.log('Parsed result (' + type + '):', JSON.stringify(result, null, 2));
  return result;
}

function fillFormFromOCR(parsed, type) {
  const fields = type === 'thisYear' ? FIELDS_THIS_YEAR : FIELDS_LAST_YEAR;
  let filledCount = 0;

  fields.forEach(f => {
    const val = parsed[f.key];
    if (val !== null && val !== undefined && !isNaN(val) && val > 0) {
      const el = document.getElementById('inp_' + f.key);
      if (el) {
        el.value = val;
        el.classList.add('data-input');
        filledCount++;
      }
    }
  });

  saveFormData();
  updateOutput();

  const label = type === 'thisYear' ? '浠婂勾' : '25骞村悓鏈?;
  if (filledCount > 0) {
    showToast(`鉁?${label}鏁版嵁宸茶瘑鍒?${filledCount} 涓瓧娈碉紝璇锋牳瀵筦);
  } else {
    showToast(`鈿狅笍 ${label}鏈兘璇嗗埆鏈夋晥鏁版嵁锛岃鎵嬪姩濉叆`);
  }
}

}

function debounce(fn, delay) {
  let timer;
  return function(...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), delay);
  };
}
